<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomscroll Awareness</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <h1>Doomscroll Awareness</h1>
    </nav>

    <section class="container">
        <h2>How many hours did you scroll today?</h2>

        <input type="number" id="hoursInput" placeholder="Enter hours (e.g. 3)">
        <button onclick="checkUsage()">Check</button>

        <p id="result"></p>

        <!-- Progress bar -->
        <div class="progress-box">
            <div id="progressBar"></div>
        </div>
    </section>

    
<div class="video-overlay">
    <iframe 
        src="Subway.mp4" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>
</div>


    <script src="index.js"></script>
</body>

</html>

<audio id="sirenSound" src="siren.mp3"></audio>
